services:
  - type: web
    name: proptrack-backend
    env: python
    plan: free
    buildCommand: |
      pip install -r backend/requirements.txt
      python backend/manage.py collectstatic --noinput
      python backend/manage.py migrate
    startCommand: gunicorn config.wsgi:application --chdir backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: proptrack-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: PYTHON_VERSION
        value: "3.11.8"

databases:
  - name: proptrack-db
    plan: free
    databaseName: proptrack
    user: proptrack
