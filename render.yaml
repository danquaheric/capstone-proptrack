services:
  - type: web
    name: proptrack-backend
    env: python
    plan: free
    buildCommand: |
      pip install -r backend/requirements.txt
      python backend/manage.py collectstatic --noinput
      python backend/manage.py migrate
    startCommand: gunicorn config.wsgi:application --chdir backend
    envVars:
      - key: DATABASE_URL
        value: "postgresql://protrack_qd6k_user:bunFUPH6zGJM0nYCNntXpv6JparH00Yk@dpg-d6m61h4r85hc73aquu2g-a/protrack_qd6k"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: PYTHON_VERSION
        value: "3.11.8"

  - type: pserv
    name: proptrack-db
    plan: free
    env: postgresql
